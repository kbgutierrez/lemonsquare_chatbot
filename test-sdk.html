<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Company Portal</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 40px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to the Internal Portal</h1>
        <p>This is a sample page to demonstrate the embedded Lemon Square IT Support Chatbot.</p>
        <p>The chat bubble should automatically appear in the bottom right corner of this screen.</p>
    </div>

    <script src="https://lschat.bigefoodcorp.com.ph/bot/static/lemonsquare-chat.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            window.LemonSquareChat.mount({
                config: {
                    apiBaseUrl: "https://lschat.bigefoodcorp.com.ph/api",
                    userToken: "EMP-12345"
                }
            });
        });
    </script>

</body>
</html>
